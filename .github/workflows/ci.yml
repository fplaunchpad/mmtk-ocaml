name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y build-essential libgmp-dev libelf-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Get OCaml submodule commit SHA
        id: ocaml-sha
        run: echo "sha=$(git rev-parse HEAD:ocaml-5)" >> "$GITHUB_OUTPUT"

      - name: Restore OCaml build cache
        id: cache-ocaml
        uses: actions/cache@v4
        with:
          path: |
            ocaml-5/ocamlopt.opt
            ocaml-5/stdlib
          key: ${{ runner.os }}-ocaml5-${{ steps.ocaml-sha.outputs.sha }}

      - name: Fix OCaml compiler timestamp after cache restore
        if: steps.cache-ocaml.outputs.cache-hit == 'true'
        run: touch ocaml-5/ocamlopt.opt

      - name: Run C test
        run: make test-c

      - name: Build OCaml 5.4.1 from submodule
        if: steps.cache-ocaml.outputs.cache-hit != 'true'
        run: make ocaml

      - name: Run full test suite
        run: make test
